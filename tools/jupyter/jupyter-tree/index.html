<!DOCTYPE html>
<meta charset="utf-8">
<meta name="color-scheme" content="dark light" />
<oda-tester>
    <oda-jupyter-layout id="jupyterlayout"></oda-jupyter-layout>
</oda-tester>

<script type="module">
    import '../../../oda.js';
    import '../jupyter.js';
    import './jupyter-tree.js';
    import '../jupyter-message/jupyter-message.js';
    ODA({ is: 'oda-jupyter-layout', extends: 'this, oda-jupyter',
        template: `
            <oda-jupyter-tree slot="left-panel" ::focused-row="focusedCell"></oda-jupyter-tree>
            <oda-jupyter-message slot="left-panel" ::message></oda-jupyter-message>
        `,
    });

   jupyterlayout.file_path = './colab.ipynb';
</script>
